app:
  host: 0.0.0.0
  port: 7001

auth:
  username: admin
  password: change-me-robot
  secret_key: change-me-session-secret

robot:
  name: Robot Arm
  driver: scservo_single
  serial_port: COM4
  baud_rate: 1000000
  servo_id: 1
  joint_name: shoulder_pan
  command_speed: 180
  command_acc: 30
  read_delay_s: 0.15
  servo_min_step: 0
  servo_max_step: 4095

joints:
  shoulder_pan:
    min: -150
    max: 150
    default: 0
  shoulder_lift:
    min: -120
    max: 90
    default: -45
  elbow_flex:
    min: -10
    max: 135
    default: 90
  wrist_flex:
    min: -90
    max: 90
    default: 0
  wrist_roll:
    min: -150
    max: 150
    default: 0
  gripper:
    min: 0
    max: 100
    default: 50
